<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moneger Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
        color: #0f172a;
        font-family: Inter, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.84);
        padding: 32px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(22, 163, 74, 0.12);
        color: #15803d;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Offline mode</span>
      <h1>Moneger is currently offline</h1>
      <p>
        Your installed app shell is available, but this route has not been cached yet. Once you
        revisit it online, core pages will be available again without the network.
      </p>
    </main>
  </body>
  </html>
